<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Radio Classics">
  <!-- Vintage radio set in the site's brown/gold theme -->
  <rect width="32" height="32" rx="6" fill="#2c1810"/>
  <!-- Antenna -->
  <line x1="9" y1="9" x2="20" y2="4" stroke="#daa520" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Radio body -->
  <rect x="6" y="9" width="20" height="17" rx="2.5" fill="#4a2c17" stroke="#daa520" stroke-width="1.2"/>
  <!-- Speaker grille -->
  <circle cx="12" cy="17.5" r="4" fill="#2c1810" stroke="#b8860b" stroke-width="1"/>
  <circle cx="12" cy="17.5" r="1.4" fill="#daa520"/>
  <!-- Tuning dial + knobs -->
  <rect x="18.5" y="13" width="5.5" height="3" rx="1" fill="#cd853f"/>
  <circle cx="19.5" cy="21.5" r="1.3" fill="#daa520"/>
  <circle cx="23" cy="21.5" r="1.3" fill="#daa520"/>
</svg>
